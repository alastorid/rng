name: BitCrack Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-cuda:
    name: Build Windows x64 CUDA/OpenCL
    runs-on: windows-2022
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install CUDA 11.4
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: "11.4.4"

      - name: Build BitCrack
        shell: pwsh
        run: |
          msbuild BitCrack.sln /m /p:Configuration=Release /p:Platform=x64
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item x64\Release\cuBitCrack.exe release\cuBitCrack-windows-amd64.exe
          Copy-Item x64\Release\clBitCrack.exe release\clBitCrack-windows-amd64.exe

      - name: Upload CUDA artifact
        uses: actions/upload-artifact@v4
        with:
          name: cuBitCrack-windows-amd64.exe
          path: release/cuBitCrack-windows-amd64.exe

      - name: Upload OpenCL artifact
        uses: actions/upload-artifact@v4
        with:
          name: clBitCrack-windows-amd64.exe
          path: release/clBitCrack-windows-amd64.exe

  linux-opencl:
    name: Build Linux x64 OpenCL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OpenCL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ocl-icd-opencl-dev opencl-headers

      - name: Build clBitCrack
        run: |
          make BUILD_OPENCL=1 OPENCL_INCLUDE=/usr/include OPENCL_LIB=/usr/lib/x86_64-linux-gnu dir_keyfinder
          mkdir -p release
          cp bin/clBitCrack release/clBitCrack-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clBitCrack-linux-x64
          path: release/clBitCrack-linux-x64

  publish:
    name: Publish Release
    needs:
      - linux-opencl
      - windows-cuda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -maxdepth 2 -type f -print -exec cp {} release/ \;
          ls -la release

      - name: Move rolling release tag
        if: github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f bitcrack-latest "${GITHUB_SHA}"
          git push -f origin bitcrack-latest

      - name: Publish rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view bitcrack-latest >/dev/null 2>&1; then
            gh release upload bitcrack-latest release/* --clobber
          else
            gh release create bitcrack-latest release/* \
              --title "BitCrack Latest" \
              --notes "Automated BitCrack builds from master." \
              --prerelease
          fi
