name: Native OpenCL Dev

on:
  push:
    branches:
      - dev-opencl
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64 OpenCL Dev
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: native/go.mod

      - name: Resolve dependencies
        working-directory: native
        run: go mod tidy

      - name: Test
        working-directory: native
        run: go test ./...

      - name: Build
        working-directory: native
        shell: bash
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w" -o dist/rng-native-windows-amd64.exe ./cmd/rng-native

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rng-native-windows-amd64.exe
          path: native/dist/rng-native-windows-amd64.exe

  release:
    name: Publish OpenCL Dev Release
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir release
          find artifacts -type f -maxdepth 2 -print -exec cp {} release/ \;
          ls -la release

      - name: Move dev release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f native-opencl-dev "${GITHUB_SHA}"
          git push -f origin native-opencl-dev

      - name: Publish dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view native-opencl-dev >/dev/null 2>&1; then
            gh release upload native-opencl-dev release/* --clobber
          else
            gh release create native-opencl-dev release/* \
              --title "Native OpenCL Dev" \
              --notes "Automated Windows OpenCL development builds from dev-opencl." \
              --prerelease
          fi
